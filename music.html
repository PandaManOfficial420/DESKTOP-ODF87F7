<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Music Player - DESKTOP-ODF87F7</title>

<meta property="og:title" content="Music Player">
<meta property="og:description" content="Beautiful music player for all your audio files.">
<!-- Site icons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1a1a2e">

<style>
:root{
  color-scheme:dark;
  --bg-start:#1a1a2e;
  --bg-mid:#16213e;
  --bg-end:#0f3460;
  --accent:#f27121;
  --accent-2:#e94560;
  --glass:rgba(255,255,255,.07);
  --glass-strong:rgba(255,255,255,.12);
  --stroke:rgba(255,255,255,.14);
  --shadow:0 18px 50px rgba(0,0,0,.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}

html{
  min-height:100%;
  background:#10172a;
}

body{
  min-height:100vh;
  min-height:100svh;
  background:
    radial-gradient(circle at top left, rgba(233,69,96,.28), transparent 34rem),
    radial-gradient(circle at bottom right, rgba(242,113,33,.22), transparent 30rem),
    linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
  color:white;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

button,
a,
input{
  -webkit-tap-highlight-color:transparent;
}

/* SITE NAV */
.site-nav{position:sticky;top:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px clamp(16px,3vw,32px);background:rgba(17,24,39,.78);border-bottom:1px solid rgba(255,255,255,.16);backdrop-filter:blur(18px);box-shadow:0 10px 30px rgba(0,0,0,.18);flex-shrink:0}
.site-brand{color:white;text-decoration:none;font-size:clamp(16px,2vw,18px);font-weight:800;letter-spacing:.2px;white-space:nowrap}
.site-links{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.site-links a{color:white;text-decoration:none;padding:8px 12px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.08);transition:all .25s ease}
.site-links a:hover,.site-links a.active{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.35);transform:translateY(-1px)}
.site-links a:focus-visible,.btn:focus-visible,.download-btn:focus-visible,.progress-bar:focus-visible,.volume-slider:focus-visible{outline:3px solid rgba(242,113,33,.7);outline-offset:3px}

/* CONTAINER */
.container{
  width:min(100%, 1240px);
  margin:0 auto;
  display:grid;
  grid-template-columns:minmax(300px, 380px) minmax(0, 1fr);
  align-items:stretch;
  flex:1;
  gap:clamp(16px,2vw,24px);
  padding:clamp(16px,2.6vw,28px);
  min-height:0;
}

/* PLAYER SECTION */
.player-section{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--stroke);
  border-radius:24px;
  padding:clamp(20px,3vw,32px) clamp(16px,2vw,22px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-width:0;
  overflow-y:auto;
  box-shadow:var(--shadow);
}

/* ALBUM ART */
.album-art-container{
  width:min(100%, 280px);
  aspect-ratio:1;
  height:auto;
  background:linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%);
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(76px,9vw,120px);
  margin-bottom:clamp(20px,3vw,30px);
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  position:relative;
  overflow:hidden;
  animation:spin 20s linear infinite;
}

.album-art-container.paused{ animation:none; }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

/* TRACK INFO */
.track-info{ text-align:center; width:100%; margin-bottom:20px; min-width:0 }
.track-name{ font-size:clamp(17px,2vw,20px); font-weight:700; margin-bottom:8px; word-break:break-word; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100% }
.track-time{ font-size:13px; opacity:0.75 }

/* PROGRESS BAR */
.progress-container{ width:100%; margin-bottom:20px }
.progress-bar{ width:100%; height:8px; background:rgba(255,255,255,.12); border-radius:999px; cursor:pointer; margin-bottom:10px; overflow:hidden; touch-action:none }
.progress{ height:100%; background:linear-gradient(90deg, var(--accent-2) 0%, var(--accent) 100%); border-radius:999px; width:0%; transition:width .12s linear }
.time-display{ display:flex; justify-content:space-between; font-size:12px; opacity:0.75 }

/* CONTROLS */
.controls{ display:flex; gap:clamp(10px,2vw,15px); margin-bottom:25px; justify-content:center; width:100%; flex-wrap:wrap }
.btn{ min-width:48px; min-height:48px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:white; padding:12px 16px; border-radius:14px; cursor:pointer; font-size:16px; transition:all 0.3s ease; display:flex; align-items:center; justify-content:center }
.btn:hover{ background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.3); transform:scale(1.05) }
.btn-play{ min-width:72px; background:linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%); border:none; padding:15px 25px; font-size:20px }
.btn-play:hover{ transform:scale(1.1); box-shadow:0 5px 20px rgba(233,69,96,.5) }

/* VOLUME */
.volume-container{ width:100%; margin-bottom:4px }
.volume-label{ font-size:12px; margin-bottom:10px; opacity:0.75; text-transform:uppercase; letter-spacing:.08em }
.volume-slider{ width:100%; height:8px; border-radius:999px; background:rgba(255,255,255,.12); outline:none; -webkit-appearance:none; appearance:none; cursor:pointer }
.volume-slider::-webkit-slider-thumb{ -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 0 4px rgba(242,113,33,.18) }
.volume-slider::-moz-range-thumb{ width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; box-shadow:0 0 0 4px rgba(242,113,33,.18) }

/* PLAYLIST */
.playlist-section{ min-width:0; background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--stroke); border-radius:24px; padding:clamp(16px,2.3vw,22px); display:flex; flex-direction:column; box-shadow:var(--shadow); overflow:hidden }
.playlist-title{ font-size:clamp(19px,2.2vw,24px); font-weight:800; margin-bottom:15px; color:var(--accent); display:flex; align-items:center; justify-content:space-between; gap:12px }
.playlist-title::after{ content:"Tap a track to play"; color:rgba(255,255,255,.58); font-size:12px; font-weight:600 }
.playlist{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; min-height:0; padding-right:4px }
.playlist-item{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); padding:12px 15px; border-radius:14px; cursor:pointer; transition:all 0.3s ease; font-size:14px; display:flex; align-items:center; gap:10px; min-height:54px }
.playlist-item:hover{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.2); transform:translateX(5px) }
.playlist-item.active{ background:linear-gradient(135deg, var(--accent-2) 0%, var(--accent) 100%); border-color:var(--accent); font-weight:700; box-shadow:0 10px 24px rgba(233,69,96,.22) }
.playlist-icon{ font-size:16px; flex-shrink:0 }
.playlist-name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.download-btn{ color:white; text-decoration:none; padding:8px 11px; border:1px solid rgba(255,255,255,.25); border-radius:999px; background:rgba(255,255,255,.1); font-size:13px; flex-shrink:0; transition:all .25s ease; white-space:nowrap }
.download-btn:hover{ background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.45); transform:scale(1.05) }

/* SCROLLBAR */
.player-section::-webkit-scrollbar,.playlist::-webkit-scrollbar{ width:6px }
.player-section::-webkit-scrollbar-track,.playlist::-webkit-scrollbar-track{ background:transparent }
.player-section::-webkit-scrollbar-thumb,.playlist::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.2); border-radius:10px }
.player-section::-webkit-scrollbar-thumb:hover,.playlist::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.3) }

/* RESPONSIVE */
@media (min-width:901px){
  .player-section{ position:sticky; top:calc(57px + clamp(16px,2.6vw,28px)); max-height:calc(100svh - 57px - (clamp(16px,2.6vw,28px) * 2)); }
}

@media (max-width:900px){
  body{ overflow-y:auto; }
  .container{ grid-template-columns:1fr; min-height:auto; }
  .player-section{ overflow:visible; }
  .playlist-section{ min-height:380px; }
  .album-art-container{ width:min(56vw,240px); }
}

@media (max-width:640px){
  .site-nav{align-items:stretch;flex-direction:column;padding:12px 16px;gap:12px}
  .site-links{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;justify-content:stretch}
  .site-links a{padding:9px 8px;font-size:13px;text-align:center;white-space:nowrap}
  .container{ padding:14px; gap:14px; }
  .player-section,.playlist-section{ border-radius:18px; }
  .album-art-container{ width:min(68vw,210px); border-radius:20px; }
  .track-name{ white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .controls{ justify-content:space-between; }
  .btn{ flex:1; }
  .btn-play{ flex:1.25; }
  .playlist-title{ flex-direction:column; align-items:flex-start; gap:4px; }
  .playlist-item{ align-items:flex-start; flex-wrap:wrap; }
  .playlist-name{ flex-basis:calc(100% - 30px); white-space:normal; overflow-wrap:anywhere; }
  .download-btn{ margin-left:26px; width:calc(100% - 26px); text-align:center; }
}

@media (max-width:380px){
  .site-links{ grid-template-columns:1fr; }
  .album-art-container{ width:100%; }
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ animation-duration:.01ms!important; animation-iteration-count:1!important; scroll-behavior:auto!important; transition-duration:.01ms!important; }
}
</style>
</head>

<body>

<nav class="site-nav" aria-label="Main navigation">
  <a class="site-brand" href="index.html">💻 DESKTOP-ODF87F7</a>
  <div class="site-links">
    <a href="index.html">📁 Files</a>
    <a class="active" href="music.html" aria-current="page">🎵 Music</a>
    <a href="png.html">🖼️ PNG Pager</a>
  </div>
</nav>

<div class="container">
  <!-- PLAYER -->
  <div class="player-section">
    <div class="album-art-container" id="albumArt">🎵</div>
    
    <div class="track-info">
      <div class="track-name" id="trackName">Select a song</div>
      <div class="track-time">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar" role="slider" aria-label="Track progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0" onclick="seek(event)">
        <div class="progress" id="progress"></div>
      </div>
      <div class="time-display">
        <span id="timeElapsed">0:00</span>
        <span id="timeRemaining">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn" type="button" onclick="previousTrack()" title="Previous" aria-label="Previous track">⏮️</button>
      <button class="btn btn-play" type="button" id="playBtn" onclick="togglePlay()" title="Play/Pause" aria-label="Play or pause">▶️</button>
      <button class="btn" type="button" onclick="nextTrack()" title="Next" aria-label="Next track">⏭️</button>
    </div>

    <div class="volume-container">
      <div class="volume-label">Volume</div>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" onchange="setVolume()" aria-label="Volume">
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-section">
    <div class="playlist-title">🎼 Playlist</div>
    <div class="playlist" id="playlist"></div>
  </div>
</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];
let BRANCH = "main";
let currentTrackIndex = 0;
let isPlaying = false;
let audioPlayer = new Audio();
let musicFiles = [];

/* FORMAT TIME */
function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return "0:00";
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

/* CHECK IF AUDIO */
function isAudio(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp3", "ogg", "wav"].includes(ext);
}

/* BRANCH DETECT */
async function detectBranch() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
    const data = await res.json();
    BRANCH = data.default_branch || "main";
  } catch {
    BRANCH = "main";
  }
}

/* LOAD FILES */
async function loadRepo() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    if (!Array.isArray(items)) return;

    currentItems = items;
    musicFiles = items.filter(item => isAudio(item.name));
    
    if (musicFiles.length === 0) {
      document.getElementById("playlist").innerHTML = "<p style='text-align:center; opacity:0.5;'>No music files found</p>";
      return;
    }

    renderPlaylist();
    
    if (musicFiles.length > 0) {
      loadTrack(0);
    }

  } catch {
    console.error("Failed to load files");
  }
}

/* RAW FILE URL */
function getRawURL(file) {
  return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${file.path}`;
}

/* RENDER PLAYLIST */
function renderPlaylist() {
  const playlistDiv = document.getElementById("playlist");
  playlistDiv.innerHTML = "";

  musicFiles.forEach((file, index) => {
    const item = document.createElement("div");
    item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
    const fileName = document.createElement("span");
    fileName.className = "playlist-name";
    fileName.textContent = file.name;

    const downloadLink = document.createElement("a");
    downloadLink.className = "download-btn";
    downloadLink.href = getRawURL(file);
    downloadLink.download = file.name;
    downloadLink.textContent = "⬇️ Download";
    downloadLink.title = `Download ${file.name}`;
    downloadLink.setAttribute("aria-label", `Download ${file.name}`);
    downloadLink.onclick = (event) => event.stopPropagation();

    item.innerHTML = `<span class="playlist-icon">🎵</span>`;
    item.appendChild(fileName);
    item.appendChild(downloadLink);
    item.onclick = () => playTrack(index);
    playlistDiv.appendChild(item);
  });
}

/* LOAD TRACK */
function loadTrack(index) {
  if (index < 0 || index >= musicFiles.length) return;

  currentTrackIndex = index;
  const file = musicFiles[index];
  audioPlayer.src = getRawURL(file);
  document.getElementById("trackName").textContent = file.name;
  
  updatePlaylistUI();
  renderPlaylist();
}

/* PLAY TRACK */
function playTrack(index) {
  loadTrack(index);
  play();
}

/* TOGGLE PLAY */
function togglePlay() {
  if (isPlaying) pause();
  else play();
}

/* PLAY */
function play() {
  audioPlayer.play();
  isPlaying = true;
  document.getElementById("playBtn").textContent = "⏸️";
  document.getElementById("albumArt").classList.remove("paused");
}

/* PAUSE */
function pause() {
  audioPlayer.pause();
  isPlaying = false;
  document.getElementById("playBtn").textContent = "▶️";
  document.getElementById("albumArt").classList.add("paused");
}

/* NEXT TRACK */
function nextTrack() {
  playTrack((currentTrackIndex + 1) % musicFiles.length);
}

/* PREVIOUS TRACK */
function previousTrack() {
  playTrack((currentTrackIndex - 1 + musicFiles.length) % musicFiles.length);
}

/* SEEK */
function seek(event) {
  const progressBar = document.getElementById("progressBar");
  const percent = event.offsetX / progressBar.offsetWidth;
  audioPlayer.currentTime = percent * audioPlayer.duration;
}

/* SET VOLUME */
function setVolume() {
  const volume = document.getElementById("volumeSlider").value;
  audioPlayer.volume = volume / 100;
}

/* UPDATE PLAYLIST UI */
function updatePlaylistUI() {
  document.querySelectorAll(".playlist-item").forEach((item, i) => {
    if (i === currentTrackIndex) {
      item.classList.add("active");
    } else {
      item.classList.remove("active");
    }
  });
}

/* AUDIO EVENTS */
audioPlayer.addEventListener("timeupdate", () => {
  const percent = Number.isFinite(audioPlayer.duration) && audioPlayer.duration > 0
    ? (audioPlayer.currentTime / audioPlayer.duration) * 100
    : 0;
  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("progressBar").setAttribute("aria-valuenow", Math.round(percent));
  document.getElementById("timeElapsed").textContent = formatTime(audioPlayer.currentTime);
  document.getElementById("timeRemaining").textContent = formatTime(audioPlayer.duration - audioPlayer.currentTime);
  document.getElementById("currentTime").textContent = formatTime(audioPlayer.currentTime);
});

audioPlayer.addEventListener("loadedmetadata", () => {
  document.getElementById("duration").textContent = formatTime(audioPlayer.duration);
});

audioPlayer.addEventListener("ended", () => {
  nextTrack();
});

/* GO BACK */
function goBack() {
  window.location.href = "index.html";
}

/* START */
detectBranch().then(loadRepo);
setVolume();
</script>

</body>
</html>
