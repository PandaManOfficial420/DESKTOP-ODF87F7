<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Music Player - DESKTOP-ODF87F7</title>

<meta property="og:title" content="Music Player">
<meta property="og:description" content="Beautiful music player for all your audio files.">
<meta name="theme-color" content="#1a1a2e">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color:white;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* CONTAINER */
.container{
  display:flex;
  flex:1;
  gap:20px;
  padding:20px;
  overflow:hidden;
}

/* PLAYER SECTION */
.player-section{
  flex:0 0 350px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
}

/* ALBUM ART */
.album-art-container{
  width:280px;
  height:280px;
  background:linear-gradient(135deg, #e94560 0%, #f27121 100%);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:120px;
  margin-bottom:30px;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  position:relative;
  overflow:hidden;
  animation:spin 20s linear infinite;
}

.album-art-container.paused{ animation:none; }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

/* TRACK INFO */
.track-info{ text-align:center; width:100%; margin-bottom:20px }
.track-name{ font-size:18px; font-weight:700; margin-bottom:8px; word-break:break-word; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100% }
.track-time{ font-size:13px; opacity:0.7 }

/* PROGRESS BAR */
.progress-container{ width:100%; margin-bottom:20px }
.progress-bar{ width:100%; height:4px; background:rgba(255,255,255,.1); border-radius:10px; cursor:pointer; margin-bottom:8px }
.progress{ height:100%; background:linear-gradient(90deg, #e94560 0%, #f27121 100%); border-radius:10px; width:0% }
.time-display{ display:flex; justify-content:space-between; font-size:12px; opacity:0.7 }

/* CONTROLS */
.controls{ display:flex; gap:15px; margin-bottom:25px; justify-content:center; width:100% }
.btn{ background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); color:white; padding:12px 16px; border-radius:12px; cursor:pointer; font-size:16px; transition:all 0.3s ease; display:flex; align-items:center; justify-content:center }
.btn:hover{ background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.3); transform:scale(1.05) }
.btn-play{ background:linear-gradient(135deg, #e94560 0%, #f27121 100%); border:none; padding:15px 25px; font-size:20px }
.btn-play:hover{ transform:scale(1.1); box-shadow:0 5px 20px rgba(233,69,96,.5) }

/* VOLUME */
.volume-container{ width:100%; margin-bottom:20px }
.volume-label{ font-size:12px; margin-bottom:8px; opacity:0.7 }
.volume-slider{ width:100%; height:4px; border-radius:10px; background:rgba(255,255,255,.1); outline:none; -webkit-appearance:none }
.volume-slider::-webkit-slider-thumb{ -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#f27121; cursor:pointer }
.volume-slider::-moz-range-thumb{ width:14px; height:14px; border-radius:50%; background:#f27121; cursor:pointer; border:none }

/* PLAYLIST */
.playlist-section{ flex:1; background:rgba(255,255,255,.05); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:20px; display:flex; flex-direction:column }
.playlist-title{ font-size:20px; font-weight:700; margin-bottom:15px; color:#f27121 }
.playlist{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px }
.playlist-item{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); padding:12px 15px; border-radius:10px; cursor:pointer; transition:all 0.3s ease; font-size:14px; display:flex; align-items:center; gap:10px }
.playlist-item:hover{ background:rgba(255,255,255,.1); border-color:rgba(255,255,255,.2); transform:translateX(5px) }
.playlist-item.active{ background:linear-gradient(135deg, #e94560 0%, #f27121 100%); border-color:#f27121; font-weight:700 }
.playlist-icon{ font-size:16px; flex-shrink:0 }

/* SCROLLBAR */
.playlist::-webkit-scrollbar{ width:6px }
.playlist::-webkit-scrollbar-track{ background:transparent }
.playlist::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.2); border-radius:10px }
.playlist::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.3) }

/* RESPONSIVE */
@media (max-width:768px){ .container{ flex-direction:column } .player-section{ flex:0 0 auto; max-width:100% } .album-art-container{ width:200px; height:200px; font-size:80px } }
</style>
</head>

<body>

<div class="container">
  <!-- PLAYER -->
  <div class="player-section">
    <div class="album-art-container" id="albumArt">🎵</div>
    
    <div class="track-info">
      <div class="track-name" id="trackName">Select a song</div>
      <div class="track-time">
        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar" onclick="seek(event)">
        <div class="progress" id="progress"></div>
      </div>
      <div class="time-display">
        <span id="timeElapsed">0:00</span>
        <span id="timeRemaining">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn" onclick="previousTrack()" title="Previous">⏮️</button>
      <button class="btn btn-play" id="playBtn" onclick="togglePlay()" title="Play/Pause">▶️</button>
      <button class="btn" onclick="nextTrack()" title="Next">⏭️</button>
    </div>

    <div class="volume-container">
      <div class="volume-label">Volume</div>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" onchange="setVolume()">
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-section">
    <div class="playlist-title">🎼 Playlist</div>
    <div class="playlist" id="playlist"></div>
  </div>
</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];
let BRANCH = "main";
let currentTrackIndex = 0;
let isPlaying = false;
let audioPlayer = new Audio();
let musicFiles = [];

/* FORMAT TIME */
function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return "0:00";
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

/* CHECK IF AUDIO */
function isAudio(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp3", "ogg", "wav"].includes(ext);
}

/* BRANCH DETECT */
async function detectBranch() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
    const data = await res.json();
    BRANCH = data.default_branch || "main";
  } catch {
    BRANCH = "main";
  }
}

/* LOAD FILES */
async function loadRepo() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    if (!Array.isArray(items)) return;

    currentItems = items;
    musicFiles = items.filter(item => isAudio(item.name));
    
    if (musicFiles.length === 0) {
      document.getElementById("playlist").innerHTML = "<p style='text-align:center; opacity:0.5;'>No music files found</p>";
      return;
    }

    renderPlaylist();
    
    if (musicFiles.length > 0) {
      loadTrack(0);
    }

  } catch {
    console.error("Failed to load files");
  }
}

/* RENDER PLAYLIST */
function renderPlaylist() {
  const playlistDiv = document.getElementById("playlist");
  playlistDiv.innerHTML = "";

  musicFiles.forEach((file, index) => {
    const item = document.createElement("div");
    item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
    item.innerHTML = `<span class="playlist-icon">🎵</span><span>${file.name}</span>`;
    item.onclick = () => playTrack(index);
    playlistDiv.appendChild(item);
  });
}

/* LOAD TRACK */
function loadTrack(index) {
  if (index < 0 || index >= musicFiles.length) return;

  currentTrackIndex = index;
  const file = musicFiles[index];
  const rawURL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${file.path}`;

  audioPlayer.src = rawURL;
  document.getElementById("trackName").textContent = file.name;
  
  updatePlaylistUI();
  renderPlaylist();
}

/* PLAY TRACK */
function playTrack(index) {
  loadTrack(index);
  play();
}

/* TOGGLE PLAY */
function togglePlay() {
  if (isPlaying) pause();
  else play();
}

/* PLAY */
function play() {
  audioPlayer.play();
  isPlaying = true;
  document.getElementById("playBtn").textContent = "⏸️";
  document.getElementById("albumArt").classList.remove("paused");
}

/* PAUSE */
function pause() {
  audioPlayer.pause();
  isPlaying = false;
  document.getElementById("playBtn").textContent = "▶️";
  document.getElementById("albumArt").classList.add("paused");
}

/* NEXT TRACK */
function nextTrack() {
  playTrack((currentTrackIndex + 1) % musicFiles.length);
}

/* PREVIOUS TRACK */
function previousTrack() {
  playTrack((currentTrackIndex - 1 + musicFiles.length) % musicFiles.length);
}

/* SEEK */
function seek(event) {
  const progressBar = document.getElementById("progressBar");
  const percent = event.offsetX / progressBar.offsetWidth;
  audioPlayer.currentTime = percent * audioPlayer.duration;
}

/* SET VOLUME */
function setVolume() {
  const volume = document.getElementById("volumeSlider").value;
  audioPlayer.volume = volume / 100;
}

/* UPDATE PLAYLIST UI */
function updatePlaylistUI() {
  document.querySelectorAll(".playlist-item").forEach((item, i) => {
    if (i === currentTrackIndex) {
      item.classList.add("active");
    } else {
      item.classList.remove("active");
    }
  });
}

/* AUDIO EVENTS */
audioPlayer.addEventListener("timeupdate", () => {
  const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("timeElapsed").textContent = formatTime(audioPlayer.currentTime);
  document.getElementById("timeRemaining").textContent = formatTime(audioPlayer.duration - audioPlayer.currentTime);
  document.getElementById("currentTime").textContent = formatTime(audioPlayer.currentTime);
});

audioPlayer.addEventListener("loadedmetadata", () => {
  document.getElementById("duration").textContent = formatTime(audioPlayer.duration);
});

audioPlayer.addEventListener("ended", () => {
  nextTrack();
});

/* GO BACK */
function goBack() {
  window.location.href = "index.html";
}

/* START */
detectBranch().then(loadRepo);
setVolume();
</script>

</body>
</html>
