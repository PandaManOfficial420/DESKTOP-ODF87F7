<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESKTOP-ODF87F7 Files</title>

<meta property="og:title" content="DESKTOP-ODF87F7 Files">
<meta property="og:description" content="Browse and download files directly from GitHub repository.">
<meta name="theme-color" content="#111827">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:white;
}

/* HEADER */
header{
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:700;
}

/* MAIN */
.container{ padding:25px; }

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:20px;
}

.file-icon{ font-size:40px; margin-bottom:10px; }
.file-name{ font-size:16px; margin-bottom:6px; word-break:break-word; }
.file-type{ opacity:.7; margin-bottom:15px; }

.buttons{
  display:flex;
  gap:10px;
}

button{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* VIEWER */
.viewer{
  max-width:1200px;
  margin:0 auto;
}

.viewer pre{
  white-space:pre-wrap;
  background:rgba(0,0,0,.4);
  padding:20px;
  border-radius:15px;
  overflow:auto;
}

.viewer img{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px 0;
}

.viewer video,
.viewer audio{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px 0;
  background:rgba(0,0,0,.4);
  padding:10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">💻 DESKTOP-ODF87F7 Files</div>
</header>

<div class="container">
  <div id="content" class="files-grid">Loading files...</div>
</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];
let BRANCH = "main";

/* ICONS */
function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  return {
    png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️",
    mp4:"🎬", mp3:"🎵", ogg:"🎵",
    zip:"📦", html:"🌐", css:"🎨", js:"⚡", json:"🧩",
    md:"📘", txt:"📄"
  }[ext] || "📄";
}

/* CHECK IF VIEWABLE */
function isViewable(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp","mp4","mp3","ogg"].includes(ext);
}

/* CHECK IF IMAGE */
function isImage(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp"].includes(ext);
}

/* CHECK IF VIDEO */
function isVideo(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp4"].includes(ext);
}

/* CHECK IF AUDIO */
function isAudio(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp3","ogg"].includes(ext);
}

/* BRANCH DETECT */
async function detectBranch() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
    const data = await res.json();
    BRANCH = data.default_branch || "main";
  } catch {
    BRANCH = "main";
  }
}

/* LOAD FILES */
async function loadRepo() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    if (!Array.isArray(items)) {
      content.innerHTML = "⚠️ GitHub API error (rate limit or repo not found)";
      return;
    }

    currentItems = items;
    renderFiles(items);

  } catch {
    content.innerHTML = "⚠️ Failed to load files.";
  }
}

/* RENDER */
function renderFiles(items) {
  const content = document.getElementById("content");

  const hidden = ["index.html", "manifest.json", "sw.js"];

  const visible = items.filter(i =>
    !hidden.includes(i.name.toLowerCase())
  );

  content.className = "files-grid";
  content.innerHTML = "";

  visible.forEach(item => {

    const rawURL =
      `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${item.path}`;

    const card = document.createElement("div");
    card.className = "file";

    const viewBtn = document.createElement("button");
    viewBtn.textContent = "View 👁️";
    
    // Enable view button for images, videos, and audio
    if (isViewable(item.name)) {
      viewBtn.onclick = () => viewFile(rawURL, item.path);
    } else {
      viewBtn.disabled = true;
      viewBtn.title = "View only available for images, videos, and audio";
    }

    const downloadLink = document.createElement("a");
    downloadLink.href = rawURL;
    downloadLink.download = item.name;
    const downloadBtn = document.createElement("button");
    downloadBtn.textContent = "Download ⬇";
    downloadLink.appendChild(downloadBtn);

    const buttonsDiv = document.createElement("div");
    buttonsDiv.className = "buttons";
    buttonsDiv.appendChild(viewBtn);
    buttonsDiv.appendChild(downloadLink);

    card.innerHTML = `
      <div class="file-icon">${getIcon(item.name, item.type)}</div>
      <div class="file-name">${item.name}</div>
      <div class="file-type">${item.type}</div>
    `;

    card.appendChild(buttonsDiv);
    content.appendChild(card);
  });
}

/* VIEW FILE */
async function viewFile(url, path) {
  const content = document.getElementById("content");

  try {
    content.className = "viewer";

    let mediaHTML = "";
    
    if (isImage(path)) {
      mediaHTML = `<img src="${url}" alt="${path}">`;
    } else if (isVideo(path)) {
      mediaHTML = `<video controls width="100%"><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video>`;
    } else if (isAudio(path)) {
      mediaHTML = `<audio controls style="width:100%;"><source src="${url}" type="audio/mpeg">Your browser does not support the audio element.</audio>`;
    }

    content.innerHTML = `
      <button onclick="renderFiles(currentItems)">⬅ Back</button>
      <h2 style="margin:15px 0;">📄 ${path}</h2>
      ${mediaHTML}
    `;

  } catch {
    content.innerHTML = "⚠️ Unable to view file.";
  }
}

/* START */
detectBranch().then(loadRepo);
setInterval(loadRepo, 30000);
</script>

</body>
</html>
