<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:white;
}

header{
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  font-size:30px;
  font-weight:700;
}

.search{
  width:320px;
  max-width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  color:white;
}

.container{ padding:25px; }

.hero{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:40px;
  margin-bottom:30px;
}

.hero h1{ font-size:42px; margin-bottom:10px; }
.hero p{ opacity:.8; }

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:25px;
}

.file-icon{ font-size:45px; margin-bottom:15px; }
.file-name{ font-size:18px; margin-bottom:10px; word-break:break-word; }
.file-type{ opacity:.7; margin-bottom:20px; }

.buttons{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">💻 DESKTOP-ODF87F7 Files</div>
  <input id="search" class="search" placeholder="Search files...">
</header>

<div class="container">

  <div class="hero">
    <h1>Welcome 👋</h1>
    <p>DESKTOP-ODF87F7 Files!</p>
  </div>

  <div id="content" class="files-grid">Loading files...</div>

</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];

function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  return {
    png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️",
    zip:"📦", html:"🌐", css:"🎨", js:"⚡", json:"🧩"
  }[ext] || "📄";
}

async function loadRepo() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    currentItems = Array.isArray(items) ? items : [];
    renderFiles(currentItems);

  } catch {
    content.innerHTML = "<div>⚠️ Failed to load files.</div>";
  }
}

function renderFiles(items) {
  const content = document.getElementById("content");

  const hidden = ["index.html", "manifest.json", "sw.js"];

  const visible = items.filter(i =>
    !hidden.includes(i.name.toLowerCase())
  );

  content.innerHTML = "";

  visible.forEach(item => {

    const rawURL =
      `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${item.path}`;

    const card = document.createElement("div");
    card.className = "file";

    card.innerHTML = `
      <div class="file-icon">${getIcon(item.name, item.type)}</div>
      <div class="file-name">${item.name}</div>
      <div class="file-type">${item.type === "dir" ? "Folder" : "File"}</div>

      <div class="buttons">
        <button onclick="viewFile('${rawURL}', '${item.path}')">View 👁️</button>
        <a href="${rawURL}" download style="flex:1">
          <button>Download ⬇</button>
        </a>
      </div>
    `;

    content.appendChild(card);
  });
}

async function viewFile(url, path) {
  const content = document.getElementById("content");

  try {
    const res = await fetch(url);
    const text = await res.text();

    const safe = text
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");

    content.className = "";

    content.innerHTML = `
      <div class="viewer">
        <h2>📄 ${path}</h2>
        <br>
        <button onclick="renderFiles(currentItems)">⬅ Back</button>
        <pre>${safe}</pre>
      </div>
    `;

  } catch {
    content.innerHTML = "<div>⚠️ Unable to view file.</div>";
  }
}

document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  renderFiles(currentItems.filter(i => i.name.toLowerCase().includes(v)));
});

loadRepo();
setInterval(loadRepo, 30000);
</script>

</body>
</html>
