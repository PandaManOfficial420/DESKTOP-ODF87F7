<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESKTOP-ODF87F7 Files</title>

<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DESKTOP Files">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:white;
}

header{
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  font-size:30px;
  font-weight:700;
}

.search{
  width:320px;
  max-width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  color:white;
}

.container{ padding:25px; }

.hero{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:40px;
  margin-bottom:30px;
}

.hero h1{ font-size:42px; margin-bottom:10px; }
.hero p{ opacity:.8; }

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:25px;
  transition:.3s;
}

.file:hover{ transform:translateY(-8px); }

.file-icon{ font-size:45px; margin-bottom:15px; }
.file-name{ font-size:18px; margin-bottom:10px; word-break:break-word; }
.file-type{ opacity:.7; margin-bottom:20px; }

.file button{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:12px 16px;
  border-radius:14px;
  cursor:pointer;
}

.viewer{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:25px;
}

.viewer pre{
  margin-top:20px;
  background:rgba(0,0,0,.3);
  padding:20px;
  border-radius:20px;
  overflow:auto;
  white-space:pre-wrap;
}

footer{
  text-align:center;
  padding:40px;
  opacity:.7;
}
</style>
</head>

<body>

<header>
  <div class="logo">💻 DESKTOP-ODF87F7 Files</div>
  <input id="search" class="search" placeholder="Search files...">
</header>

<div class="container">

  <div class="hero">
    <h1>Welcome Back 👋</h1>
    <p>Browse files directly from your GitHub repository. Updates every 30 seconds.</p>
  </div>

  <div id="content" class="files-grid">Loading files...</div>

</div>

<footer>© 2026 DESKTOP-ODF87F7 Files</footer>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];

function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  return {
    png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️",
    zip:"📦", html:"🌐", css:"🎨", js:"⚡", json:"🧩"
  }[ext] || "📄";
}

async function loadRepo() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    currentItems = Array.isArray(items) ? items : [];
    renderFiles(currentItems);

  } catch {
    content.innerHTML = "<div class='viewer'>⚠️ Failed to load files.</div>";
  }
}

function renderFiles(items) {
  const content = document.getElementById("content");

  const hidden = ["index.html", "manifest.json", "sw.js"];

  const visible = items.filter(item =>
    !hidden.includes(item.name.toLowerCase())
  );

  if (!visible.length) {
    content.innerHTML = "<div class='viewer'>No files found.</div>";
    return;
  }

  content.className = "files-grid";
  content.innerHTML = "";

  visible.forEach(item => {
    const card = document.createElement("div");
    card.className = "file";

    card.innerHTML = `
      <div class="file-icon">${getIcon(item.name, item.type)}</div>
      <div class="file-name">${item.name}</div>
      <div class="file-type">${item.type === "dir" ? "Folder" : "File"}</div>
      <button>Open</button>
    `;

    card.querySelector("button").onclick = () => {
      if (item.type === "file") openFile(item.path);
    };

    content.appendChild(card);
  });
}

async function openFile(path) {
  const raw = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;
  const content = document.getElementById("content");

  try {
    const res = await fetch(raw);
    const text = await res.text();

    const escaped = text
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");

    content.className = "";

    content.innerHTML = `
      <div class="viewer">
        <h2>📄 ${path}</h2>
        <br>
        <button onclick="renderFiles(currentItems)">⬅ Back</button>
        <pre>${escaped}</pre>
      </div>
    `;

  } catch {
    content.innerHTML = "<div class='viewer'>⚠️ Unable to open file.</div>";
  }
}

document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  renderFiles(currentItems.filter(i => i.name.toLowerCase().includes(v)));
});

loadRepo();
setInterval(loadRepo, 30000);
</script>

</body>
</html>
