<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESKTOP-ODF87F7 Files</title>

<meta property="og:title" content="DESKTOP-ODF87F7 Files">
<meta property="og:description" content="Browse and download files directly from GitHub repository.">
<meta name="theme-color" content="#111827">

<!-- Site icons -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.json">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:white;
}


/* SITE NAV */
.site-nav{
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:14px 25px;
  background:rgba(17,24,39,.78);
  border-bottom:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(18px);
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.site-brand{
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:800;
  letter-spacing:.2px;
  white-space:nowrap;
}
.site-links{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.site-links a{
  color:white;
  text-decoration:none;
  padding:8px 12px;
  border:1px solid rgba(255,255,255,.16);
  border-radius:999px;
  background:rgba(255,255,255,.08);
  transition:all .25s ease;
}
.site-links a:hover,
.site-links a.active{
  background:rgba(255,255,255,.22);
  border-color:rgba(255,255,255,.35);
  transform:translateY(-1px);
}
@media (max-width:640px){
  .site-nav{align-items:flex-start;flex-direction:column;padding:12px 16px}
  .site-links{justify-content:flex-start}
  .site-links a{padding:7px 10px;font-size:14px}
}

/* MAIN */
.container{ padding:25px; }

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:20px;
}

.file-icon{ font-size:40px; margin-bottom:10px; }
.file-name{ font-size:16px; margin-bottom:6px; word-break:break-word; }
.file-type{ opacity:.7; margin-bottom:15px; }

.buttons{
  display:flex;
  gap:10px;
}

button{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover:not(:disabled){
  background:rgba(255,255,255,.25);
  border-color:rgba(255,255,255,.4);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* VIEWER */
.viewer{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.viewer h2{
  margin:15px 0 25px 0;
  text-align:center;
}

.viewer img{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px 0;
  display:block;
  margin-left:auto;
  margin-right:auto;
}

.viewer video{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px auto;
  background:rgba(0,0,0,.4);
  padding:10px;
  display:block;
}

.viewer audio{
  width:100%;
  max-width:500px;
  height:auto;
  border-radius:15px;
  margin:20px auto;
  background:rgba(0,0,0,.4);
  padding:15px;
  display:block;
}

.back-btn{
  display:inline-block;
  margin-bottom:20px;
}
</style>
</head>

<body>

<nav class="site-nav" aria-label="Main navigation">
  <a class="site-brand" href="index.html">💻 DESKTOP-ODF87F7</a>
  <div class="site-links">
    <a class="active" href="index.html" aria-current="page">📁 Files</a>
    <a href="music.html">🎵 Music</a>
    <a href="png.html">🖼️ PNG Pager</a>
  </div>
</nav>

<div class="container">
  <div id="content" class="files-grid">Loading files...</div>
</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];
let BRANCH = "main";

/* ICONS */
function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  return {
    png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️",
    mp4:"🎬", mp3:"🎵", ogg:"🎵",
    zip:"📦", html:"🌐", css:"🎨", js:"⚡", json:"🧩",
    md:"📘", txt:"📄"
  }[ext] || "📄";
}

/* CHECK IF VIEWABLE */
function isViewable(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp","mp4","mp3","ogg"].includes(ext);
}

/* CHECK IF IMAGE */
function isImage(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp"].includes(ext);
}

/* CHECK IF VIDEO */
function isVideo(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp4"].includes(ext);
}

/* CHECK IF AUDIO */
function isAudio(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp3","ogg"].includes(ext);
}

/* BRANCH DETECT */
async function detectBranch() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
    const data = await res.json();
    BRANCH = data.default_branch || "main";
  } catch {
    BRANCH = "main";
  }
}

/* LOAD FILES */
async function loadRepo() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    if (!Array.isArray(items)) {
      content.innerHTML = "⚠️ GitHub API error (rate limit or repo not found)";
      return;
    }

    currentItems = items;
    renderFiles(items);

  } catch {
    content.innerHTML = "⚠️ Failed to load files.";
  }
}

/* RENDER */
function renderFiles(items) {
  const content = document.getElementById("content");

  const hidden = ["index.html", "manifest.json", "sw.js", "music.html", "png.html"];

  const visible = items.filter(i =>
    !hidden.includes(i.name.toLowerCase())
  );

  content.className = "files-grid";
  content.innerHTML = "";

  visible.forEach(item => {

    const rawURL =
      `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${item.path}`;

    const card = document.createElement("div");
    card.className = "file";

    const viewBtn = document.createElement("button");
    viewBtn.textContent = "View 👁️";
    
    /* Enable view button for images, videos, and audio */
    if (isViewable(item.name)) {
      viewBtn.onclick = () => viewFile(rawURL, item.path, item.name);
    } else {
      viewBtn.disabled = true;
      viewBtn.title = "View only available for images, videos, and audio";
    }

    const downloadLink = document.createElement("a");
    downloadLink.href = rawURL;
    downloadLink.download = item.name;
    const downloadBtn = document.createElement("button");
    downloadBtn.textContent = "Download ⬇";
    downloadLink.appendChild(downloadBtn);

    const buttonsDiv = document.createElement("div");
    buttonsDiv.className = "buttons";
    buttonsDiv.appendChild(viewBtn);
    buttonsDiv.appendChild(downloadLink);

    card.innerHTML = `
      <div class="file-icon">${getIcon(item.name, item.type)}</div>
      <div class="file-name">${item.name}</div>
      <div class="file-type">${item.type}</div>
    `;

    card.appendChild(buttonsDiv);
    content.appendChild(card);
  });
}

/* VIEW FILE */
async function viewFile(url, path, name) {
  const content = document.getElementById("content");

  try {
    content.className = "viewer";

    let mediaHTML = "";
    let title = "📄";
    
    if (isImage(path)) {
      title = "🖼️ Image";
      mediaHTML = `<img src="${url}" alt="${path}">`;
    } else if (isVideo(path)) {
      title = "🎬 Video";
      mediaHTML = `<video controls width="100%" autoplay><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video>`;
    } else if (isAudio(path)) {
      title = "🎵 Music";
      mediaHTML = `<audio controls autoplay style="width:100%; max-width:600px;"><source src="${url}" type="audio/mpeg">Your browser does not support the audio element.</audio>`;
    }

    content.innerHTML = `
      <button class="back-btn" onclick="renderFiles(currentItems)">⬅ Back</button>
      <h2>${title}</h2>
      <h3 style="text-align:center; opacity:0.8; margin-bottom:20px;">${name}</h3>
      ${mediaHTML}
    `;

  } catch {
    content.innerHTML = "⚠️ Unable to view file.";
  }
}

/* START */
detectBranch().then(loadRepo);
setInterval(loadRepo, 30000);
</script>

</body>
</html>
