<head>

<title>DESKTOP-ODF87F7 Files</title>

<meta property="og:title" content="DESKTOP-ODF87F7 Files">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23fff'>💻</text></svg>">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:white;
}


/* SITE NAV */
.site-nav{
  position:sticky;
  top:0;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:16px clamp(16px,4vw,34px);
  background:
    linear-gradient(135deg,rgba(255,255,255,.22),rgba(255,255,255,.05)),
    radial-gradient(circle at top left,rgba(59,130,246,.45),transparent 35%),
    radial-gradient(circle at top right,rgba(236,72,153,.38),transparent 36%),
    rgba(15,23,42,.78);
  border-bottom:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(22px) saturate(160%);
  box-shadow:0 18px 55px rgba(0,0,0,.35);
}
.site-brand{display:flex;align-items:center;gap:12px;color:white;text-decoration:none;min-width:0}
.brand-orb{display:grid;place-items:center;width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);box-shadow:0 0 30px rgba(96,165,250,.55);animation:floatGlow 4s ease-in-out infinite}
.brand-copy{display:flex;flex-direction:column;line-height:1.05}
.brand-title{font-size:18px;font-weight:900;letter-spacing:.3px;white-space:nowrap}
.brand-subtitle{margin-top:5px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.62)}
.site-links{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.site-links a{position:relative;overflow:hidden;color:white;text-decoration:none;padding:10px 14px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,255,255,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.2);transition:transform .25s ease,background .25s ease,border-color .25s ease,box-shadow .25s ease}
.site-links a::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.28),transparent);transform:translateX(-120%);transition:transform .5s ease}
.site-links a:hover::before,.site-links a.active::before{transform:translateX(120%)}
.site-links a:hover,.site-links a.active{background:linear-gradient(135deg,rgba(96,165,250,.32),rgba(244,114,182,.28));border-color:rgba(255,255,255,.42);box-shadow:0 10px 28px rgba(59,130,246,.22);transform:translateY(-2px)}
.site-badge{display:flex;align-items:center;gap:8px;color:white;padding:9px 12px;border:1px solid rgba(255,255,255,.14);border-radius:999px;background:rgba(0,0,0,.18);font-size:13px;font-weight:700;white-space:nowrap}
.site-badge::before{content:"";width:9px;height:9px;border-radius:999px;background:#22c55e;box-shadow:0 0 14px #22c55e}
@keyframes floatGlow{0%,100%{transform:translateY(0);filter:hue-rotate(0deg)}50%{transform:translateY(-2px);filter:hue-rotate(18deg)}}
@media (max-width:760px){.site-nav{align-items:flex-start;flex-direction:column}.site-links{justify-content:flex-start}.brand-subtitle{display:none}.site-badge{display:none}}
@media (max-width:420px){.site-links a{padding:8px 10px;font-size:14px}.brand-title{font-size:16px}.brand-orb{width:40px;height:40px}}

/* MAIN */
.container{ padding:25px; }

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:25px;
  padding:20px;
}

.file-icon{ font-size:40px; margin-bottom:10px; }
.file-name{ font-size:16px; margin-bottom:6px; word-break:break-word; }
.file-type{ opacity:.7; margin-bottom:15px; }

.buttons{
  display:flex;
  gap:10px;
}

button{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover:not(:disabled){
  background:rgba(255,255,255,.25);
  border-color:rgba(255,255,255,.4);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* VIEWER */
.viewer{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}

.viewer h2{
  margin:15px 0 25px 0;
  text-align:center;
}

.viewer img{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px 0;
  display:block;
  margin-left:auto;
  margin-right:auto;
}

.viewer video{
  max-width:100%;
  height:auto;
  border-radius:15px;
  margin:20px auto;
  background:rgba(0,0,0,.4);
  padding:10px;
  display:block;
}

.viewer audio{
  width:100%;
  max-width:500px;
  height:auto;
  border-radius:15px;
  margin:20px auto;
  background:rgba(0,0,0,.4);
  padding:15px;
  display:block;
}

.back-btn{
  display:inline-block;
  margin-bottom:20px;
}
</style>
</head>

<body>

<nav class="site-nav" aria-label="Main navigation">
  <a class="site-brand" href="index.html">
    <span class="brand-orb" aria-hidden="true">💻</span>
    <span class="brand-copy">
      <span class="brand-title">DESKTOP-ODF87F7</span>
      <span class="brand-subtitle">File Command Center</span>
    </span>
  </a>
  <div class="site-links">
    <a class="active" aria-current="page" href="index.html">📁 Files</a>
    <a href="music.html">🎵 Music</a>
    <a href="png.html">🖼️ PNG Pager</a>
  </div>
  <div class="site-badge" aria-label="Repository status">Live Repo</div>
</nav>

<div class="container">
  <div id="content" class="files-grid">Loading files...</div>
</div>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentItems = [];
let BRANCH = "main";

/* ICONS */
function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  return {
    png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️",
    mp4:"🎬", mp3:"🎵", ogg:"🎵",
    zip:"📦", html:"🌐", css:"🎨", js:"⚡", json:"🧩",
    md:"📘", txt:"📄"
  }[ext] || "📄";
}

/* CHECK IF VIEWABLE */
function isViewable(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp","mp4","mp3","ogg"].includes(ext);
}

/* CHECK IF IMAGE */
function isImage(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["png","jpg","jpeg","gif","webp"].includes(ext);
}

/* CHECK IF VIDEO */
function isVideo(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp4"].includes(ext);
}

/* CHECK IF AUDIO */
function isAudio(name) {
  const ext = name.split(".").pop().toLowerCase();
  return ["mp3","ogg"].includes(ext);
}

/* BRANCH DETECT */
async function detectBranch() {
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`);
    const data = await res.json();
    BRANCH = data.default_branch || "main";
  } catch {
    BRANCH = "main";
  }
}

/* LOAD FILES */
async function loadRepo() {
  const content = document.getElementById("content");

  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents`);
    const items = await res.json();

    if (!Array.isArray(items)) {
      content.innerHTML = "⚠️ GitHub API error (rate limit or repo not found)";
      return;
    }

    currentItems = items;
    renderFiles(items);

  } catch {
    content.innerHTML = "⚠️ Failed to load files.";
  }
}

/* RENDER */
function renderFiles(items) {
  const content = document.getElementById("content");

  const hidden = ["index.html", "manifest.json", "sw.js", "music.html", "png.html"];

  const visible = items.filter(i =>
    !hidden.includes(i.name.toLowerCase())
  );

  content.className = "files-grid";
  content.innerHTML = "";

  visible.forEach(item => {

    const rawURL =
      `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${item.path}`;

    const card = document.createElement("div");
    card.className = "file";

    const viewBtn = document.createElement("button");
    viewBtn.textContent = "View 👁️";
    
    /* Enable view button for images, videos, and audio */
    if (isViewable(item.name)) {
      viewBtn.onclick = () => viewFile(rawURL, item.path, item.name);
    } else {
      viewBtn.disabled = true;
      viewBtn.title = "View only available for images, videos, and audio";
    }

    const downloadLink = document.createElement("a");
    downloadLink.href = rawURL;
    downloadLink.download = item.name;
    const downloadBtn = document.createElement("button");
    downloadBtn.textContent = "Download ⬇";
    downloadLink.appendChild(downloadBtn);

    const buttonsDiv = document.createElement("div");
    buttonsDiv.className = "buttons";
    buttonsDiv.appendChild(viewBtn);
    buttonsDiv.appendChild(downloadLink);

    card.innerHTML = `
      <div class="file-icon">${getIcon(item.name, item.type)}</div>
      <div class="file-name">${item.name}</div>
      <div class="file-type">${item.type}</div>
    `;

    card.appendChild(buttonsDiv);
    content.appendChild(card);
  });
}

/* VIEW FILE */
async function viewFile(url, path, name) {
  const content = document.getElementById("content");

  try {
    content.className = "viewer";

    let mediaHTML = "";
    let title = "📄";
    
    if (isImage(path)) {
      title = "🖼️ Image";
      mediaHTML = `<img src="${url}" alt="${path}">`;
    } else if (isVideo(path)) {
      title = "🎬 Video";
      mediaHTML = `<video controls width="100%" autoplay><source src="${url}" type="video/mp4">Your browser does not support the video tag.</video>`;
    } else if (isAudio(path)) {
      title = "🎵 Music";
      mediaHTML = `<audio controls autoplay style="width:100%; max-width:600px;"><source src="${url}" type="audio/mpeg">Your browser does not support the audio element.</audio>`;
    }

    content.innerHTML = `
      <button class="back-btn" onclick="renderFiles(currentItems)">⬅ Back</button>
      <h2>${title}</h2>
      <h3 style="text-align:center; opacity:0.8; margin-bottom:20px;">${name}</h3>
      ${mediaHTML}
    `;

  } catch {
    content.innerHTML = "⚠️ Unable to view file.";
  }
}

/* START */
detectBranch().then(loadRepo);
setInterval(loadRepo, 30000);
</script>

</body>
</html>
