<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESKTOP-ODF87F7 Files</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  padding:25px;
  flex-wrap:wrap;
}

.logo{
  font-size:28px;
  font-weight:700;
}

.search{
  width:320px;
  max-width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  color:#fff;
  outline:none;
}

.container{
  padding:25px;
}

.hero{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:40px;
  margin-bottom:25px;
}

.hero h1{
  font-size:42px;
  margin-bottom:10px;
}

.hero p{
  opacity:.8;
}

.toolbar{
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

button{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  padding:12px 18px;
  border-radius:16px;
  cursor:pointer;
  backdrop-filter:blur(20px);
}

.path{
  margin-bottom:20px;
  opacity:.8;
}

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
  transition:.3s;
}

.file:hover{
  transform:translateY(-8px);
}

.file-icon{
  font-size:45px;
  margin-bottom:15px;
}

.file-name{
  font-size:18px;
  margin-bottom:10px;
  word-break:break-word;
}

.file-type{
  opacity:.7;
  margin-bottom:20px;
}

.viewer{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
}

.viewer pre{
  margin-top:20px;
  background:rgba(0,0,0,.3);
  border-radius:20px;
  padding:20px;
  overflow:auto;
  max-height:70vh;
  white-space:pre-wrap;
}

.viewer img,
.viewer video,
.viewer audio{
  margin-top:20px;
  max-width:100%;
  border-radius:20px;
}

footer{
  text-align:center;
  padding:40px;
  opacity:.7;
}
</style>
</head>
<body>

<header>
  <div class="logo">💻 DESKTOP-ODF87F7 Files</div>

  <input
    id="search"
    class="search"
    placeholder="Search current folder..."
  >
</header>

<div class="container">

  <div class="hero">
    <h1>Welcome Back 👋</h1>
    <p>
      Browse your GitHub repository directly inside this website.
      New commits automatically appear every 30 seconds.
    </p>
  </div>

  <div class="toolbar">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="loadFolder(currentPath)">🔄 Refresh</button>
  </div>

  <div class="path" id="path">
    📁 /
  </div>

  <div id="content" class="files-grid">
    Loading...
  </div>

</div>

<footer>
  © 2026 DESKTOP-ODF87F7 Files
</footer>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let currentPath = "";
let currentItems = [];
let historyStack = [];

function icon(name, type){
  if(type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  const icons = {
    png:"🖼️",
    jpg:"🖼️",
    jpeg:"🖼️",
    gif:"🖼️",
    webp:"🖼️",
    mp4:"🎬",
    webm:"🎬",
    mp3:"🎵",
    wav:"🎵",
    html:"🌐",
    css:"🎨",
    js:"⚡",
    json:"🧩",
    zip:"📦"
  };

  return icons[ext] || "📄";
}

async function loadFolder(path = "") {
  currentPath = path;

  document.getElementById("path").textContent =
    "📁 /" + (path || "");

  const content = document.getElementById("content");

  try {
    const response = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`
    );

    const items = await response.json();

    currentItems = Array.isArray(items)
      ? items
      : [];

    renderFiles(currentItems);

  } catch {
    content.innerHTML =
      "<div class='viewer'>⚠️ Failed to load files.</div>";
  }
}

function renderFiles(items){
  const content =
    document.getElementById("content");

  if(!items.length){
    content.innerHTML =
      "<div class='viewer'>No files found.</div>";
    return;
  }

  content.className = "files-grid";
  content.innerHTML = "";

  items.forEach(item => {

    const card =
      document.createElement("div");

    card.className = "file";

    card.innerHTML = `
      <div class="file-icon">
        ${icon(item.name,item.type)}
      </div>

      <div class="file-name">
        ${item.name}
      </div>

      <div class="file-type">
        ${item.type === "dir"
          ? "Folder"
          : "File"}
      </div>

      <button>
        Open →
      </button>
    `;

    card.querySelector("button")
      .onclick = () => {

      if(item.type === "dir"){
        historyStack.push(currentPath);
        loadFolder(item.path);
      }
      else{
        openFile(item.path);
      }
    };

    content.appendChild(card);
  });
}

async function openFile(path){

  const ext =
    path.split(".").pop().toLowerCase();

  const raw =
    `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;

  const content =
    document.getElementById("content");

  content.className = "";

  if(
    ["png","jpg","jpeg","gif","webp"]
    .includes(ext)
  ){
    content.innerHTML = `
      <div class="viewer">
        <h2>🖼️ ${path}</h2>
        <img src="${raw}">
      </div>
    `;
    return;
  }

  if(
    ["mp4","webm"]
    .includes(ext)
  ){
    content.innerHTML = `
      <div class="viewer">
        <h2>🎬 ${path}</h2>
        <video controls src="${raw}"></video>
      </div>
    `;
    return;
  }

  if(
    ["mp3","wav"]
    .includes(ext)
  ){
    content.innerHTML = `
      <div class="viewer">
        <h2>🎵 ${path}</h2>
        <audio controls src="${raw}"></audio>
      </div>
    `;
    return;
  }

  try{
    const response =
      await fetch(raw);

    const text =
      await response.text();

    const escaped =
      text
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");

    content.innerHTML = `
      <div class="viewer">
        <h2>📄 ${path}</h2>
        <pre>${escaped}</pre>
      </div>
    `;
  }
  catch{
    content.innerHTML = `
      <div class="viewer">
        ⚠️ Unable to open file.
      </div>
    `;
  }
}

function goBack(){

  if(historyStack.length){
    loadFolder(
      historyStack.pop()
    );
  }
}

document
.getElementById("search")
.addEventListener("input", e => {

  const value =
    e.target.value.toLowerCase();

  const filtered =
    currentItems.filter(item =>
      item.name
      .toLowerCase()
      .includes(value)
    );

  renderFiles(filtered);
});

loadFolder();
setInterval(
  () => loadFolder(currentPath),
  30000
);
</script>

</body>
</html>
