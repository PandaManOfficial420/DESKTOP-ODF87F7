<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESKTOP-ODF87F7 Files</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px;
}

.logo{
  font-size:28px;
  font-weight:700;
}

.search{
  width:300px;
  max-width:100%;
  padding:14px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  color:#fff;
  outline:none;
}

.container{
  padding:25px;
}

.hero{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:40px;
  margin-bottom:25px;
}

.hero h1{
  font-size:45px;
  margin-bottom:10px;
}

.hero p{
  opacity:.8;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.stat{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:25px;
}

.stat h2{
  font-size:35px;
  margin-top:10px;
}

.section-title{
  margin-bottom:20px;
}

.files-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.file{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:25px;
  transition:.3s;
}

.file:hover{
  transform:translateY(-8px);
}

.file-icon{
  font-size:45px;
  margin-bottom:15px;
}

.file-name{
  font-size:18px;
  margin-bottom:8px;
  word-break:break-word;
}

.file-type{
  opacity:.7;
  margin-bottom:15px;
}

.file a{
  color:#8ec5ff;
  text-decoration:none;
}

footer{
  text-align:center;
  padding:40px;
  opacity:.7;
}
</style>
</head>
<body>

<header>
  <div class="logo">💻 DESKTOP-ODF87F7 Files</div>
  <input
    id="search"
    class="search"
    type="text"
    placeholder="Search repository files..."
  >
</header>

<div class="container">

  <div class="hero">
    <h1>Welcome Back 👋</h1>
    <p>
      Live file explorer powered by your GitHub repository.
      Push new commits and this page automatically updates.
    </p>
  </div>

  <div class="stats">
    <div class="stat">
      📁
      <h2 id="folders">0</h2>
      <p>Folders</p>
    </div>

    <div class="stat">
      📄
      <h2 id="files">0</h2>
      <p>Files</p>
    </div>

    <div class="stat">
      🔄
      <h2>30s</h2>
      <p>Auto Refresh</p>
    </div>
  </div>

  <h2 class="section-title">Repository Files</h2>

  <div id="repo-files" class="files-grid">
    Loading files...
  </div>

</div>

<footer>
  © 2026 DESKTOP-ODF87F7 Files
</footer>

<script>
const OWNER = "PandaManOfficial420";
const REPO = "DESKTOP-ODF87F7";

let allItems = [];

function getIcon(name, type) {
  if (type === "dir") return "📁";

  const ext = name.split(".").pop().toLowerCase();

  const icons = {
    png:"🖼️",
    jpg:"🖼️",
    jpeg:"🖼️",
    gif:"🖼️",
    webp:"🖼️",
    mp4:"🎬",
    mov:"🎬",
    mp3:"🎵",
    wav:"🎵",
    zip:"📦",
    html:"🌐",
    css:"🎨",
    js:"⚡",
    json:"🧩",
    md:"📝",
    txt:"📄"
  };

  return icons[ext] || "📄";
}

async function loadRepo() {
  const container = document.getElementById("repo-files");

  try {
    const response = await fetch(
      `https://api.github.com/repos/${OWNER}/${REPO}/contents`
    );

    if (!response.ok) {
      throw new Error("GitHub API error");
    }

    const items = await response.json();
    allItems = items;

    renderFiles(items);

    document.getElementById("folders").textContent =
      items.filter(x => x.type === "dir").length;

    document.getElementById("files").textContent =
      items.filter(x => x.type === "file").length;

  } catch (err) {
    container.innerHTML =
      "<div class='file'>⚠️ Unable to load repository files.</div>";

    console.error(err);
  }
}

function renderFiles(items) {
  const container = document.getElementById("repo-files");

  if (!items.length) {
    container.innerHTML =
      "<div class='file'>No files found.</div>";
    return;
  }

  container.innerHTML = "";

  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "file";

    card.innerHTML = `
      <div class="file-icon">
        ${getIcon(item.name, item.type)}
      </div>

      <div class="file-name">
        ${item.name}
      </div>

      <div class="file-type">
        ${item.type === "dir" ? "Folder" : "File"}
      </div>

      <a href="${item.html_url}" target="_blank">
        Open on GitHub →
      </a>
    `;

    container.appendChild(card);
  });
}

document
  .getElementById("search")
  .addEventListener("input", e => {

    const value = e.target.value.toLowerCase();

    const filtered = allItems.filter(item =>
      item.name.toLowerCase().includes(value)
    );

    renderFiles(filtered);
  });

loadRepo();
setInterval(loadRepo, 30000);
</script>

</body>
</html>
